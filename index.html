<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRI Operations Platform</title>
    <script>
        var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJezyDb9XBHLzL-6dhYLpgf2EfjjIGN5Ir7-0s-VV72e2kstzAl6NzyYc61aAVvhZzMQ/exec";

        // Pass all query parameters straight through to Apps Script
        var params = window.location.search;
        window.location.replace(APPS_SCRIPT_URL + params);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #ffffff;
            margin-bottom: 1.5rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            font-size: 0.95rem;
            color: #90a4ae;
        }
        .fallback {
            margin-top: 2rem;
            display: none;
        }
        .fallback a {
            color: #4fc3f7;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .fallback a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">WRI Operations Platform</div>
        <div class="spinner"></div>
        <div class="status">Loading operations portal&hellip;</div>
        <div class="fallback" id="fallback">
            <a id="fallback-link" href="#">Click here if you are not redirected</a>
        </div>
    </div>
    <script>
        // Show fallback link after 3 seconds in case redirect is blocked
        setTimeout(function() {
            var fallback = document.getElementById("fallback");
            var link = document.getElementById("fallback-link");
            link.href = APPS_SCRIPT_URL + window.location.search;
            fallback.style.display = "block";
        }, 3000);
    </script>
</body>
</html>

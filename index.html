<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRI Operations Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 2rem;
        }
        .launch-btn {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(135deg, #0066CC, #004C99);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(0, 102, 204, 0.3);
        }
        .launch-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0, 102, 204, 0.4);
        }
        .launch-btn:active {
            transform: translateY(0);
        }
        .hint {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">WRI Operations Platform</div>
        <div class="subtitle">Whitewater Rescue Institute</div>
        <a class="launch-btn" id="launchLink" href="#">Open Portal</a>
        <div class="hint">Tap to launch the operations portal</div>
    </div>
    <script>
        var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJezyDb9XBHLzL-6dhYLpgf2EfjjIGN5Ir7-0s-VV72e2kstzAl6NzyYc61aAVvhZzMQ/exec";
        var params = window.location.search;
        document.getElementById("launchLink").href = APPS_SCRIPT_URL + params;
    </script>
</body>
</html>
